version: '3'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  clean:
    desc: Remove cargo build artifacts
    cmds:
      - cargo clean

  fmt:
    desc: Format all Rust sources
    cmds:
      - cargo fmt --all

  fmt:check:
    desc: Check formatting without modifying files
    cmds:
      - cargo fmt --all -- --check

  lint:
    desc: Run clippy across the workspace (warnings as errors)
    aliases:
      - lint:check
    cmds:
      - cargo clippy --workspace --all-targets --all-features -- -D warnings

  lint:fix:
    desc: Auto-fix clippy lints, then format
    cmds:
      - cargo clippy --workspace --all-targets --all-features --fix --allow-dirty --allow-staged
      - task: fmt

  check:
    desc: Type-check the workspace without producing binaries
    cmds:
      - cargo check --workspace --all-targets
      - task: fmt:check

  build:
    desc: Build the workspace (debug profile)
    cmds:
      - cargo build --workspace --all-targets

  build:release:
    desc: Build the workspace (release profile)
    cmds:
      - cargo build --workspace --release

  test:
    desc: Run the workspace test suite
    cmds:
      - cargo test --workspace --all-targets

  test:doc:
    desc: Run doctests
    cmds:
      - cargo test --workspace --doc

  doc:
    desc: Build rustdoc for the workspace
    env:
      DOCSRS: "1"
    cmds:
      - cargo +nightly doc --workspace --no-deps --all-features --document-private-items

  doc:open:
    desc: Build and open rustdoc in browser
    env:
      DOCSRS: "1"
    cmds:
      - cargo +nightly doc --workspace --no-deps --all-features --document-private-items --open

  bench:
    desc: Run all benchmarks
    cmds:
      - cargo bench

  bench:baseline:
    desc: Save benchmark results as a named baseline (BASELINE=name, default is main)
    vars:
      BASELINE:
        sh: echo "${BASELINE:-main}"
    cmds:
      - cargo bench -- --save-baseline {{.BASELINE}}

  ci:
    desc: Run the checks expected in CI (fmt, lint, test)
    cmds:
      - task: fmt:check
      - task: lint
      - task: test
